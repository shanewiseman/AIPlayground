implementation_items:
  - item_number: 1
    requested_change_summary_context: |-
      Preserve code indentation when normalizing modified file content; only collapse internal whitespace and avoid removing all blank lines.
    technical_explanation_context: |-
      Current normalize_modified_file_content uses MULTI_SPACE_OR_TAB_RE over the entire blob, collapsing leading indentation and destroying code structure. It also reduces all repeated newlines to a single newline, eliminating blank lines entirely. For source code, this harms readability and can mislead downstream LLMs. We should normalize per line: keep leading indentation ([ \t]*), collapse only internal runs of spaces/tabs in the remainder, strip trailing whitespace, then collapse 3+ consecutive newlines to two (one blank line). Assumption: It’s acceptable to slightly diverge from the original prompt requirement that asked to reduce multiple newlines to one; preserving a single blank line is preferable for code context as per this review.
    implementation_prompt_primary_instruction: |-
      In github-pr-puller/github-pr-puller.py, update normalize_modified_file_content inside build_llm_payload as follows:
      
      - Keep MULTI_SPACE_OR_TAB_RE as-is. Stop using MULTI_NEWLINE_RE to reduce all newlines to one. Either:
        a) redefine MULTI_NEWLINE_RE = re.compile(r"\n{3,}") and replace occurrences with "\n\n", or
        b) inline re.sub for the 3+ to 2 collapse.
      
      Recommended patch:
      
      1) Change the function body:
      
      def normalize_modified_file_content(text: str) -> str:
          # Normalize line endings first
          normalized = text.replace("\r\n", "\n").replace("\r", "\n")
          # Preserve leading indentation; collapse only internal runs of spaces/tabs; trim trailing whitespace
          lines = normalized.split("\n")
          processed: list[str] = []
          for line in lines:
              m = re.match(r"^([ \t]*)(.*)$", line)
              if m:
                  indent, rest = m.groups()
                  rest = MULTI_SPACE_OR_TAB_RE.sub(" ", rest)
                  rest = rest.rstrip(" \t")
                  processed.append(indent + rest)
              else:
                  processed.append(line)
          normalized = "\n".join(processed)
          # Collapse 3+ consecutive newlines to 2 (preserve a single blank line)
          normalized = re.sub(r"\n{3,}", "\n\n", normalized)
          return normalized
      
      2) If you prefer to keep MULTI_NEWLINE_RE, redefine it near the top:
      MULTI_NEWLINE_RE = re.compile(r"\n{3,}")
      …and then use:
      normalized = MULTI_NEWLINE_RE.sub("\n\n", normalized)
      
      Import note: re is already imported at the top of the file.
