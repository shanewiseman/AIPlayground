    requested_change_summary_context: |-
      Create parent directories for output files before writing prompt debug, report, and LLM implementation files.
    technical_explanation_context: |-
      Path.write_text will fail with FileNotFoundError if the parent directory does not exist (e.g., when --output-file includes a non-existent directory). We must mkdir the parent with parents=True, exist_ok=True before each write to ensure robustness.
    implementation_prompt_primary_instruction: |-
      In main() of github-pr-puller/github-pr-puller.py:
      
      1) After computing output_file, and later after deriving prompt_debug_file and llm_implementation_file, ensure parent directories exist before write_text calls. Add a small helper or inline mkdirs.
      
      Example minimal changes right before the first write of prompt_debug_file:
      
      # After computing prompt_debug_file and llm_implementation_file
      prompt_debug_path = Path(prompt_debug_file)
      llm_impl_path = Path(llm_implementation_file)
      output_path = Path(output_file)
      
      # Ensure parents exist
      for p in (prompt_debug_path.parent, llm_impl_path.parent, output_path.parent):
          p.mkdir(parents=True, exist_ok=True)
      
      # Then write files
      prompt_debug_path.write_text(json.dumps(prompt_debug_doc, indent=2), encoding="utf-8")
      ...
      output_path.write_text(report, encoding="utf-8")
      llm_impl_path.write_text(llm_impl_report, encoding="utf-8")
      
      Be sure to move the mkdir loop before the first write (currently the prompt debug file is written earlier than the others).
