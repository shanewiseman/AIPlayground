  - item_number: 5
    requested_change_summary_context: |-
      Add hard size limits to the JSON payload embedded in the prompt to prevent context overflows: per-file truncation, total budget across all modified files, and logging when truncation/omission occurs.
    technical_explanation_context: |-
      build_analysis_prompt currently dumps the full payload (including entire contents of all modified files) into a single prompt string. Large files/PRs can exceed the model’s context limit and increase cost. Implementing per-file truncation and a total character budget across all modified_files content keeps runs predictable. Log any truncation/omission so users can understand why some content was shortened or skipped. Assumption: Exact thresholds aren’t specified; choose conservative defaults and make them easy to adjust.
    implementation_prompt_primary_instruction: |-
      In github-pr-puller/github-pr-puller.py:
      
      1) Define tunable limits near the existing constants:
      
      MAX_FILE_CONTENT_CHARS = 50_000  # per file cap
      MAX_TOTAL_MODIFIED_FILES_CHARS = 200_000  # total budget across all modified files
      
      2) Update build_llm_payload signature to accept progress and enforce limits:
      
      def build_llm_payload(
          comments: list[dict[str, Any]],
          modified_files_with_content: list[dict[str, str]],
          *,
          progress: ProgressReporter | None = None,
      ) -> dict[str, Any]:
          def normalize_modified_file_content(...):
              ...  # use the updated, indentation-preserving version
      
          truncated_files = 0
          budget_used = 0
          modified_files_out: list[dict[str, str]] = []
      
          for file_obj in modified_files_with_content:
              path = str(file_obj.get("path") or "")
              content = normalize_modified_file_content(str(file_obj.get("content") or ""))
              if len(content) > MAX_FILE_CONTENT_CHARS:
                  truncated_files += 1
                  content = content[:MAX_FILE_CONTENT_CHARS] + f"\n[... TRUNCATED to {MAX_FILE_CONTENT_CHARS} chars ...]\n"
              # Enforce total budget across all files
              if budget_used + len(content) > MAX_TOTAL_MODIFIED_FILES_CHARS:
                  if progress:
                      remaining = len(modified_files_with_content) - len(modified_files_out)
                      progress.log(
                          f"Prompt size guard: omitting {remaining} modified files due to total size limit "
                          f"({MAX_TOTAL_MODIFIED_FILES_CHARS} chars)."
                      )
                  break
              modified_files_out.append({"path": path, "content": content})
              budget_used += len(content)
      
          if progress and truncated_files:
              progress.log(
                  f"Prompt size guard: truncated {truncated_files} modified file(s) to {MAX_FILE_CONTENT_CHARS} chars each."
              )
      
          return {
              "review_comments": [
                  {"file_path": str(c.get("file_path") or ""), "body": str(c.get("body") or ""), "code_snippet": str(c.get("code_snippet") or "")}
                  for c in comments
              ],
              "modified_files": modified_files_out,
          }
      
      3) Update the call site in main():
      
      payload = build_llm_payload(
          comments=comments,
          modified_files_with_content=modified_files_with_content,
          progress=progress,
      )
      
      4) Optionally, log prompt size after building it in main():
      
      prompt = build_analysis_prompt(payload)
      progress.log(f"Prompt text size: {len(prompt)} chars")
      
      These guards cap individual file sizes and the aggregate content size, and they log when any truncation or omission occurs.
